{% extends 'base.html' %}
{% block content %}
<h1>Termine</h1>
<table class="table table-striped">
    <thead>
    <tr><th>Datum</th><th>Stadt</th><th>Venue</th><th>Info</th></tr>
    </thead>
    <tbody>
    {% for e in events %}
    <tr>
        <td>{{ e.date }}</td><td>{{ e.city }}</td><td>{{ e.venue }}</td><td>{{ e.info }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
