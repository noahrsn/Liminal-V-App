<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ band.name if band else 'Band' }} — Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('home') }}">{{ band.name if band else 'Band' }}</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">HOME</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('liminal_v') }}">LIMINAL V</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('galerie') }}">GALERIE</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('termine') }}">TERMINE</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('kontakt') }}">KONTAKT</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('booking') }}">BOOKING</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-5">
    {% block content %}{% endblock %}
</main>

<footer class="bg-dark text-light py-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; {{ band.name if band else 'Band' }} — Alle Rechte vorbehalten.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
